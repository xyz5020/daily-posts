name: Update post.xml RSS

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-post-rss
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate post.xml
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/run_full_pipeline.py \
            --allow-fallback \
            --skip-ai-if-no-key \
            --pretty \
            --feed-title "Daily Tech 摘要" \
            --feed-link "https://xyz5020.github.io/daily-posts/" \
            --feed-description "每日技术文章摘要" \
            --feed-self-link "https://xyz5020.github.io/daily-posts/post.xml" \
            --feed-output post.xml \
            --publish-path post.xml \
            --skip-opml

      - name: Commit and push post.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add post.xml
          if git diff --cached --quiet -- post.xml; then
            echo "post.xml unchanged, skip commit"
            exit 0
          fi

          git commit -m "chore: auto update post.xml"
          git push
